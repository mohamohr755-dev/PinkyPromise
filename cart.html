<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة المشتريات | Glowy</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <h2>Glowy<span>.</span></h2> 
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="index.html">المنتجات</a></li>
            </ul>
        </nav>
        <div class="cart-btn">
            <a href="cart.html" class="btn-outline">السلة (0)</a>
        </div>
    </header>

    <section class="cart-page">
        <div class="cart-container">
            
            <div class="cart-items-section">
                <h2>مراجعة الطلبات</h2>
                <div id="cart-items-wrapper">
                    </div>
            </div>

            <div class="cart-summary-section">
                <h2>إتمام الطلب</h2>
                <div class="summary-details">
                    <p>الإجمالي: <span id="total-price">0</span> ج.م</p>
                    <p class="shipping-note">*الشحن يضاف لاحقاً حسب المحافظة</p>
                </div>

                <form id="checkout-form">
                    <div class="input-group">
                        <label>الاسم بالكامل</label>
                        <input type="text" id="customer-name" required placeholder="اكتب اسمك هنا">
                    </div>
                    <div class="input-group">
                        <label>رقم الموبايل</label>
                        <input type="tel" id="customer-phone" required placeholder="01xxxxxxxxx">
                    </div>
                    <div class="input-group">
                        <label>العنوان بالتفصيل</label>
                        <textarea id="customer-address" required placeholder="المحافظة، المنطقة، الشارع، رقم العمارة"></textarea>
                    </div>
                    <button type="submit" class="btn-whatsapp">تأكيد الطلب عبر واتساب 💬</button>
                </form>
            </div>

        </div>
    </section>

    <script src="js/cart.js"></script>
    <script src="js/store_logic.js"></script>
</body>
</html>
