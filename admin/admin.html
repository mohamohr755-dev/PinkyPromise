<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم | Glowy System</title>
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <h2>Glowy <span>Admin</span></h2>
            </div>
            <ul class="nav-menu">
                <li class="active" onclick="switchTab('overview')">📊 نظرة عامة</li>
                <li onclick="switchTab('products')">🛍️ المنتجات</li>
                <li onclick="switchTab('orders')">📦 الطلبات الجديدة</li>
                <li onclick="switchTab('customers')">👥 قاعدة العملاء</li>
            </ul>
        </aside>

        <main class="main-content">
            <section id="products-section" class="content-section">
                <div class="section-header">
                    <h1>إدارة المنتجات</h1>
                    <button class="btn-primary" onclick="openModal()">+ إضافة منتج جديد</button>
                </div>

                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>صورة</th>
                                <th>اسم المنتج</th>
                                <th>السعر</th>
                                <th>القسم</th>
                                <th>حالة العرض</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="products-table-body">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>إضافة منتج جديد</h2>
            <form id="add-product-form">
                <div class="input-group">
                    <label>اسم المنتج</label>
                    <input type="text" id="p-name" required>
                </div>
                <div class="input-group">
                    <label>السعر (ج.م)</label>
                    <input type="number" id="p-price" required>
                </div>
                <div class="input-group">
                    <label>رابط الصورة (URL)</label>
                    <input type="text" id="p-image" required placeholder="https://...">
                </div>
                <div class="input-group">
                    <label>القسم</label>
                    <select id="p-category">
                        <option value="skincare">عناية بالبشرة</option>
                        <option value="haircare">عناية بالشعر</option>
                        <option value="makeup">مكياج</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 15px;">حفظ في قاعدة البيانات</button>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
